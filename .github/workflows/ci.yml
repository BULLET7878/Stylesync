name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: Lint + Build ───────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true   # lint warnings shouldn't block deploy

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SELLER_UPI_ID: ${{ secrets.VITE_SELLER_UPI_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend: Install + Syntax Check ─────────────────────────────────────
  backend:
    name: Backend — Install & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — server entry
        run: node --check server.js

      - name: Syntax check — all controllers
        run: |
          for f in controllers/*.js middleware/*.js models/*.js routes/*.js utils/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

  # ─── Deploy notification (runs after both jobs pass on main) ─────────────
  notify:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "✅ Frontend build passed"
          echo "✅ Backend syntax check passed"
          echo "🚀 Vercel will auto-deploy from main branch"
