name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: Lint + Build ───────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://stylesync-navy.vercel.app' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || '' }}
          VITE_SELLER_UPI_ID: ${{ secrets.VITE_SELLER_UPI_ID || '' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend: Install + Syntax Check ─────────────────────────────────────
  backend:
    name: Backend — Install & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — all JS files
        run: node -e "
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const dirs = ['controllers', 'middleware', 'models', 'routes', 'utils'];
          let failed = false;
          dirs.forEach(dir => {
            if (!fs.existsSync(dir)) return;
            fs.readdirSync(dir).filter(f => f.endsWith('.js')).forEach(file => {
              const fp = path.join(dir, file);
              try {
                execSync('node --check ' + fp, { stdio: 'pipe' });
                console.log('OK: ' + fp);
              } catch(e) {
                console.error('FAIL: ' + fp);
                console.error(e.stderr.toString());
                failed = true;
              }
            });
          });
          try {
            execSync('node --check server.js', { stdio: 'pipe' });
            console.log('OK: server.js');
          } catch(e) {
            console.error('FAIL: server.js');
            failed = true;
          }
          if (failed) process.exit(1);
        "

  # ─── Deploy notification ──────────────────────────────────────────────────
  notify:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "Frontend build passed"
          echo "Backend syntax check passed"
          echo "Vercel will auto-deploy from main branch"
