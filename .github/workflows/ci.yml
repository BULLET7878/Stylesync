name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: Build ────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ""
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SELLER_UPI_ID: ${{ secrets.VITE_SELLER_UPI_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend: Install + Syntax Check ─────────────────────────────────────
  backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check — all JS files
        run: |
          node --check server.js && echo "OK: server.js"
          for dir in controllers middleware models routes utils; do
            [ -d "$dir" ] && for f in $dir/*.js; do
              node --check "$f" && echo "OK: $f" || exit 1
            done
          done

  # ─── Deploy notification ──────────────────────────────────────────────────
  notify:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "✅ Frontend build passed"
          echo "✅ Backend syntax check passed"
          echo "🚀 Vercel will auto-deploy from main branch"
