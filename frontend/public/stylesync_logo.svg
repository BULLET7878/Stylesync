<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background -->
  <rect width="100" height="100" fill="#ffffff" rx="15" />
  
  <!-- Swastik Symbol -->
  <g stroke="#D4AF37" stroke-width="8" stroke-linecap="round" fill="none">
    <line x1="50" y1="20" x2="50" y2="80" />
    <line x1="20" y1="50" x2="80" y2="50" />
    <line x1="50" y1="20" x2="75" y2="20" />
    <line x1="80" y1="50" x2="80" y2="75" />
    <line x1="50" y1="80" x2="25" y2="80" />
    <line x1="20" y1="50" x2="20" y2="25" />
  </g>
  
  <!-- Four Auspicious Dots -->
  <g fill="#D4AF37">
    <circle cx="35" cy="35" r="4.5" />
    <circle cx="65" cy="35" r="4.5" />
    <circle cx="35" cy="65" r="4.5" />
    <circle cx="65" cy="65" r="4.5" />
  </g>
</svg>
